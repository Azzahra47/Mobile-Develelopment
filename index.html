<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyago - Travel Planner</title>
<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f7f6;
color:#333;
}
header{
background:linear-gradient(135deg,#1fab89,#f7d046);
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}
.container{
padding:20px;
max-width:1100px;
margin:auto;
}
.card{
background:white;
border-radius:14px;
padding:18px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.07);
animation:fade .4s ease;
}
@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1}
}
button{
background:#1fab89;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}
button.secondary{
background:#f7d046;
color:#333;
}
input,select{
width:100%;
padding:8px;
margin-top:6px;
border-radius:6px;
border:1px solid #ddd;
}
.timeline{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}
.timeline div{
background:#f0faf7;
padding:10px;
border-radius:10px;
min-height:120px;
}
.activity{
background:white;
padding:6px;
border-radius:6px;
margin-bottom:6px;
font-size:13px;
}
.badge{
font-size:11px;
background:#1fab89;
color:white;
padding:2px 6px;
border-radius:6px;
margin-left:5px;
}
.history-item{
border-bottom:1px solid #eee;
padding:6px 0;
}
@media(max-width:700px){
.timeline{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>Voyago 🌍</header>
<div class="container">

<div class="card">
<h3>Smart Packing List</h3>
<input id="dest" placeholder="Destinasi">
<input id="duration" placeholder="Durasi (hari)" type="number">
<select id="tripType">
<option value="liburan">Liburan</option>
<option value="bisnis">Bisnis</option>
<option value="petualangan">Petualangan</option>
</select>
<button onclick="generatePacking()">Generate</button>
<div id="packingList"></div>
</div>

<div class="card">
<h3>Itinerary Timeline</h3>
<input id="time" placeholder="Waktu (contoh 08:00)">
<input id="place" placeholder="Tempat">
<select id="period">
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>
<button onclick="addActivity()">Tambah Aktivitas</button>
<div class="timeline">
<div><b>Morning</b><div id="morning"></div></div>
<div><b>Afternoon</b><div id="afternoon"></div></div>
<div><b>Evening</b><div id="evening"></div></div>
</div>
</div>

<div class="card">
<h3>Smart Reminder</h3>
<div id="reminderLog">Reminder aktif...</div>
</div>

<div class="card">
<h3>Share Trip</h3>
<button onclick="shareTrip()">Copy Summary</button>
<textarea id="shareText" rows="4"></textarea>
</div>

<div class="card">
<h3>Trip History</h3>
<button class="secondary" onclick="saveTrip()">Simpan Trip</button>
<div id="history"></div>
</div>

</div>

<script>
let activities=JSON.parse(localStorage.getItem("voyago_activities")||"[]")
let packing=JSON.parse(localStorage.getItem("voyago_packing")||"[]")
let historyTrips=JSON.parse(localStorage.getItem("voyago_history")||"[]")

function generatePacking(){
let base=["Passport","Charger","Phone","Clothes","Toothbrush"]
let type=document.getElementById("tripType").value
if(type=="bisnis") base.push("Laptop","Formal Shoes")
if(type=="petualangan") base.push("Hiking Shoes","Jacket")
packing=base
saveLS()
renderPacking()
}

function renderPacking(){
let html=""
packing.forEach((item,i)=>{
html+=`<label><input type=checkbox> ${item}</label><br>`
})
document.getElementById("packingList").innerHTML=html
}

function addActivity(){
let a={
time:time.value,
place:place.value,
period:period.value
}
activities.push(a)
saveLS()
renderActivities()
}

function renderActivities(){
["morning","afternoon","evening"].forEach(p=>document.getElementById(p).innerHTML="")
activities.forEach((a,i)=>{
let el=document.createElement("div")
el.className="activity"
el.innerHTML=`${a.time} - ${a.place} <span class=badge>${a.period}</span> <button onclick="delAct(${i})">x</button>`
document.getElementById(a.period.toLowerCase()).appendChild(el)
})
}

function delAct(i){activities.splice(i,1);saveLS();renderActivities()}

function reminderLoop(){
let now=new Date()
let t=now.getHours()+":"+String(now.getMinutes()).padStart(2,'0')
activities.forEach(a=>{
if(a.time==t){
document.getElementById("reminderLog").innerHTML="Reminder: "+a.place
}
})
}
setInterval(reminderLoop,60000)

function saveTrip(){
let trip={date:new Date().toLocaleString(),activities,packing}
historyTrips.push(trip)
saveLS()
renderHistory()
}

function renderHistory(){
let html=""
historyTrips.forEach(t=>{
html+=`<div class=history-item>${t.date} (${t.activities.length} activities)</div>`
})
document.getElementById("history").innerHTML=html
}

function shareTrip(){
let text="Voyago Trip:\n"
activities.forEach(a=>text+=a.time+" - "+a.place+"\n")
document.getElementById("shareText").value=text
navigator.clipboard.writeText(text)
}

function saveLS(){
localStorage.setItem("voyago_activities",JSON.stringify(activities))
localStorage.setItem("voyago_packing",JSON.stringify(packing))
localStorage.setItem("voyago_history",JSON.stringify(historyTrips))
}

renderPacking()
renderActivities()
renderHistory()
</script>
</body>
</html>
